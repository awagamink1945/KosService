<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

            "borderRadius": {

            "spacing": {

                    "gutter": "12px",
                    "container-padding": "20px",

                    "md": "16px",
                    "sm": "8px",
                    "lg": "24px",
                    "base": "4px"
            },
            "fontFamily": {
                    "body-lg": ["Inter"],
                    "label-sm": ["Inter"],
                    "button": ["Inter"],
                    "h2": ["Inter"],
                    "h1": ["Inter"],
                    "body-md": ["Inter"]

            "fontSize": {
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        body {
            background-color: #f9f9ff;
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased">
<!-- Top AppBar (Injected from Shared Components Hierarchy) -->
<header class="fixed top-0 left-0 w-full z-50 bg-white border-b border-slate-100 flex justify-between items-center px-5 py-3 shadow-sm">
<div class="flex items-center gap-4">
<button class="active:opacity-80 transition-opacity" onclick="history.back()">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-['Inter'] font-semibold text-lg text-primary">Galon</h1>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-slate-500">notifications</span>
<div class="w-8 h-8 rounded-full bg-surface-container-highest overflow-hidden border border-slate-100">
<img alt="User Profile Photo" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBLuldOs-5M_MII7YocUuJJ-8Olt3b-vPudIjnFhT_6zGCBLPtQpcbN2ps0Oi40x5_OpCerpjxjWfcxBhyT7WgWSXw02B1CApvPkJpByzrIKvPvaz4P5olEpRHdV8LtnzZ9kVlUGgCiMXfFIDshfUy-0ZBx_GG9Eof-h_Z-k0zO052JQErGgt0wOsjmAtkkXB7Lwg_4bapawNZVejoqMiWkaDXD8TeT_LDlmaIf0fUv2OhVQrLtaaUsUZfbJm6OKJ_2_tYonHpQigE"/>
</div>
</div>
</header>
<main class="pt-20 pb-32 px-container-padding max-w-2xl mx-auto">
<!-- Hero Section: Service Illustration -->
<section class="mb-lg">
<div class="relative w-full aspect-square bg-surface-container rounded-xl overflow-hidden shadow-sm flex items-center justify-center">
<img class="w-full h-full object-cover" data-alt="A professional close-up photograph of a clean, crystal-clear 19-liter water gallon placed on a minimalist wooden stand. The lighting is soft and natural, coming from a large window in a modern, brightly lit Indonesian boarding house interior. The color palette features clean whites and refreshing blue tones, emphasizing a sense of hygiene and reliability. The overall mood is peaceful and high-end, representing a premium delivery service." src="https://lh3.googleusercontent.com/aida/ADBb0ujar8ImWZ9RS9-M54mHXoTHI2sU1BbskWALDpQ8TLYjoxX83Gk37wuWTCjy2MdW8bkCRgUgmD0u_wz8oJ5fJrcqE0bF_mj2Nz8r5QTJSBDxW-6RGhnDL1bX1ZGswkxCHNXGcqMYK4LCokNoPHn79FcECyGI2KXYVH6WqPUdjnN8qsTSj8o64dBzXbVePhnAfN8T1trTsVu0VTtife0k9Wk1YRIw3mx9PIJLc3MvmXE6WKJbPHWwUQTqSddhFau4v8S74uOAuUJP"/>
<div class="absolute bottom-4 left-4 bg-white/90 backdrop-blur-sm px-4 py-2 rounded-full flex items-center gap-2 border border-blue-50">
<span class="material-symbols-outlined text-primary text-md">verified</span>
<span class="font-label-sm text-on-surface-variant">Layanan Terpercaya KosService</span>
</div>
</div>
</section>
<!-- Product Selection Section -->
<section class="mb-lg">
<h2 class="font-h2 text-on-surface mb-md">Pilih Layanan</h2>
<div class="grid grid-cols-1 gap-md">
<!-- Product Card 1 -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant/30 flex items-center justify-between group cursor-pointer hover:border-primary/50 transition-colors">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-primary-container/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">water_drop</span>
</div>
<div>
<p class="font-body-lg font-semibold text-on-surface">Galon Aqua 19L</p>
<p class="font-body-md text-primary font-bold">Rp 20.000</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary bg-primary flex items-center justify-center">
<div class="w-2.5 h-2.5 rounded-full bg-white"></div>
</div>
</div>
<!-- Product Card 2 -->
<div class="bg-surface-container-lowest p-md rounded-xl border border-outline-variant/30 flex items-center justify-between cursor-pointer hover:border-primary/50 transition-colors">
<div class="flex items-center gap-md">
<div class="w-12 h-12 rounded-lg bg-surface-container-highest flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">restart_alt</span>
</div>
<div>
<p class="font-body-lg font-semibold text-on-surface">Isi Ulang Galon</p>
<p class="font-body-md text-on-surface-variant">Rp 6.000</p>
</div>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant"></div>
</div>
</div>
</section>
<!-- Quantity & Options -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-lg mb-lg">
<!-- Quantity Selector -->
<section>
<h2 class="font-h2 text-on-surface mb-md">Jumlah</h2>
<div class="flex items-center justify-between bg-surface-container-lowest p-md rounded-xl border border-outline-variant/30">
<button class="w-10 h-10 rounded-lg bg-surface-container-highest flex items-center justify-center active:scale-90 transition-transform">
<span class="material-symbols-outlined">remove</span>
</button>
<span class="font-h1 text-primary">1</span>
<button class="w-10 h-10 rounded-lg bg-primary text-white flex items-center justify-center active:scale-90 transition-transform shadow-md">
<span class="material-symbols-outlined">add</span>
</button>
</div>
</section>
<!-- Quick Preference Chip -->
<section>
<h2 class="font-h2 text-on-surface mb-md">Preferensi</h2>
<div class="flex flex-wrap gap-sm">
<span class="px-4 py-2 rounded-full bg-secondary-container text-on-secondary-container font-label-sm border border-secondary/20">Diantar Sekarang</span>
<span class="px-4 py-2 rounded-full bg-surface-container-highest text-on-surface-variant font-label-sm">Taruh di Depan Pintu</span>
</div>
</section>
</div>
<!-- Delivery Instructions -->
<section class="mb-xl">
<h2 class="font-h2 text-on-surface mb-md">Instruksi Pengiriman</h2>
<div class="relative">
<div class="absolute left-4 top-4 text-outline">
<span class="material-symbols-outlined">notes</span>
</div>
<textarea class="w-full min-h-[120px] bg-surface-container-lowest border border-outline-variant rounded-xl pl-12 pr-4 py-4 font-body-md focus:border-primary focus:ring-1 focus:ring-primary outline-none resize-none transition-all" placeholder="Contoh: Titip di penjaga kos atau taruh depan kamar 204"></textarea>
</div>
</section>
</main>
<!-- Sticky Bottom Ordering Section -->
<footer class="fixed bottom-0 left-0 w-full bg-white/80 backdrop-blur-md border-t border-slate-100 px-container-padding py-4 shadow-[0_-4px_12px_rgba(0,0,0,0.08)] z-50">
<div class="max-w-2xl mx-auto flex items-center justify-between gap-lg">
<div class="flex flex-col">
<span class="font-label-sm text-on-surface-variant uppercase tracking-wider">Total Pembayaran</span>
<span class="font-h1 text-on-surface">Rp 20.000</span>
</div>
<button class="flex-1 max-w-[240px] h-[52px] bg-primary text-on-primary rounded-xl font-button shadow-lg shadow-primary/20 active:scale-95 transition-transform flex items-center justify-center gap-2" onclick="window.location.href='orders.html'">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">shopping_cart_checkout</span>
                Pesan Sekarang
            </button>
</div>
</footer>
<!-- Bottom Nav Bar (Suppressing because this is a task-focused sub-page as per Mandate) -->
<!-- The mandate states: suppress if the page content features a "Back" action that implies a temporary departure -->
</body></html>
