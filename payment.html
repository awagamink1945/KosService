<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "tertiary-container": "#bc4800",
                        "tertiary-fixed-dim": "#ffb596",
                        "surface-bright": "#f9f9ff",
                        "on-secondary-fixed-variant": "#005236",
                        "on-background": "#151c27",
                        "tertiary-fixed": "#ffdbcd",
                        "surface-container": "#e7eefe",
                        "secondary": "#006c49",
                        "primary-fixed": "#dbe1ff",
                        "on-tertiary-container": "#ffede6",
                        "on-secondary-fixed": "#002113",
                        "background": "#f9f9ff",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#dce2f3",
                        "secondary-fixed-dim": "#4edea3",
                        "on-primary-container": "#eeefff",
                        "inverse-on-surface": "#ebf1ff",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#dce2f3",
                        "error": "#ba1a1a",
                        "on-error-container": "#93000a",
                        "primary-container": "#2563eb",
                        "tertiary": "#943700",
                        "primary": "#004ac6",
                        "surface-dim": "#d3daea",
                        "secondary-container": "#6cf8bb",
                        "on-primary-fixed-variant": "#003ea8",
                        "inverse-primary": "#b4c5ff",
                        "error-container": "#ffdad6",
                        "secondary-fixed": "#6ffbbe",
                        "primary-fixed-dim": "#b4c5ff",
                        "surface-container-low": "#f0f3ff",
                        "on-primary-fixed": "#00174b",
                        "on-tertiary-fixed-variant": "#7d2d00",
                        "on-tertiary-fixed": "#360f00",
                        "on-error": "#ffffff",
                        "surface-tint": "#0053db",
                        "on-surface": "#151c27",
                        "outline-variant": "#c3c6d7",
                        "outline": "#737686",
                        "surface": "#f9f9ff",
                        "on-tertiary": "#ffffff",
                        "on-surface-variant": "#434655",
                        "on-secondary": "#ffffff",
                        "surface-container-high": "#e2e8f8",
                        "inverse-surface": "#2a313d",
                        "on-secondary-container": "#00714d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "container-padding": "20px",
                        "xl": "32px",
                        "md": "16px",
                        "lg": "24px",
                        "gutter": "12px",
                        "xs": "4px",
                        "base": "4px",
                        "sm": "8px"
                    },
                    "fontFamily": {
                        "h2": ["Inter"],
                        "button": ["Inter"],
                        "h1": ["Inter"],
                        "body-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"]
                    },
                    "fontSize": {
                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "button": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "h1": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-background text-on-background min-h-screen">
<!-- TopAppBar Section -->
<header class="fixed top-0 w-full z-50 bg-white/90 backdrop-blur-md border-b border-gray-100 shadow-sm">
<div class="flex items-center px-5 h-16 w-full max-w-md mx-auto">
<button class="material-symbols-outlined text-blue-600 p-2 hover:bg-gray-100 rounded-full transition-colors active:scale-95 transition-all duration-200" data-icon="arrow_back" onclick="history.back()">arrow_back</button>
<h1 class="ml-4 font-h1 text-h1 text-gray-900 tracking-tight">Pilih Pembayaran</h1>
</div>
</header>
<main class="pt-20 pb-32 w-full max-w-md mx-auto px-5">
<!-- Order Summary Card -->
<section class="mb-lg">
<div class="bg-surface-container-low p-md rounded-xl shadow-sm border border-outline-variant flex items-center gap-md">
<div class="w-16 h-16 rounded-lg overflow-hidden shrink-0">
<img class="w-full h-full object-cover" data-alt="A close-up photograph of a clean, modern laundry service bag sitting on a polished wooden floor. The lighting is soft and natural, emphasizing a minimalist and reliable service atmosphere. The color palette is dominated by soft neutrals and professional blues, reflecting the efficiency and care of the KosService ecosystem." src="https://lh3.googleusercontent.com/aida/ADBb0ujar8ImWZ9RS9-M54mHXoTHI2sU1BbskWALDpQ8TLYjoxX83Gk37wuWTCjy2MdW8bkCRgUgmD0u_wz8oJ5fJrcqE0bF_mj2Nz8r5QTJSBDxW-6RGhnDL1bX1ZGswkxCHNXGcqMYK4LCokNoPHn79FcECyGI2KXYVH6WqPUdjnN8qsTSj8o64dBzXbVePhnAfN8T1trTsVu0VTtife0k9Wk1YRIw3mx9PIJLc3MvmXE6WKJbPHWwUQTqSddhFau4v8S74uOAuUJP">
</div>
<div>
<h2 class="font-h2 text-h2 text-on-surface">Total Pembayaran</h2>
<p class="font-h1 text-h1 text-primary">Rp 20.000</p>
</div>
</div>
</section>
<!-- E-Wallet Section -->
<section class="mb-lg">
<h3 class="font-h2 text-h2 mb-md text-on-surface-variant flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="account_balance_wallet">account_balance_wallet</span>
                E-Wallet
            </h3>
<div class="space-y-sm">
<!-- GoPay -->
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="payments">payments</span>
</div>
<span class="font-body-lg text-body-lg font-medium">GoPay</span>
</div>
<input checked="" class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
<!-- OVO -->
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-purple-50 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-purple-600" data-icon="account_balance_wallet">account_balance_wallet</span>
</div>
<span class="font-body-lg text-body-lg font-medium">OVO</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
<!-- Dana -->
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-blue-50 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-blue-500" data-icon="wallet">wallet</span>
</div>
<span class="font-body-lg text-body-lg font-medium">Dana</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
</div>
</section>
<!-- Bank Transfer Section -->
<section class="mb-lg">
<h3 class="font-h2 text-h2 mb-md text-on-surface-variant flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="account_balance">account_balance</span>
                Virtual Account
            </h3>
<div class="space-y-sm">
<!-- BCA -->
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center">
<span class="font-bold text-blue-900 text-[10px]">BCA</span>
</div>
<span class="font-body-lg text-body-lg font-medium">BCA Virtual Account</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
<!-- Mandiri -->
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center">
<span class="font-bold text-yellow-600 text-[10px]">MANDIRI</span>
</div>
<span class="font-body-lg text-body-lg font-medium">Mandiri Virtual Account</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
<!-- BNI -->
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-gray-50 rounded-lg flex items-center justify-center">
<span class="font-bold text-orange-600 text-[10px]">BNI</span>
</div>
<span class="font-body-lg text-body-lg font-medium">BNI Virtual Account</span>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
</div>
</section>
<!-- Cash Section -->
<section class="mb-lg">
<h3 class="font-h2 text-h2 mb-md text-on-surface-variant flex items-center gap-sm">
<span class="material-symbols-outlined text-primary" data-icon="handshake">handshake</span>
                Tunai
            </h3>
<label class="group flex items-center justify-between p-md bg-white border border-outline-variant rounded-xl cursor-pointer hover:border-primary transition-all active:scale-[0.98]">
<div class="flex items-center gap-md">
<div class="w-10 h-10 bg-green-50 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-secondary" data-icon="payments">payments</span>
</div>
<div class="flex flex-col">
<span class="font-body-lg text-body-lg font-medium">Tunai saat Penjemputan</span>
<span class="text-label-sm text-on-surface-variant">Bayar langsung ke kurir</span>
</div>
</div>
<input class="w-5 h-5 text-primary focus:ring-primary border-outline-variant" name="payment" type="radio">
</label>
</section>
</main>
<!-- Footer Action -->
<footer class="fixed bottom-0 w-full bg-white shadow-[0_-4px_12px_rgba(0,0,0,0.08)] border-t border-gray-100 z-50">
<div class="max-w-md mx-auto px-5 py-md">
<button class="w-full h-[52px] bg-primary text-on-primary font-button text-button rounded-xl shadow-sm hover:bg-primary-container active:scale-[0.97] transition-all flex items-center justify-center gap-sm" onclick="window.location.href='orders.html'">
                Konfirmasi
                <span class="material-symbols-outlined" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</footer>


</body></html>
